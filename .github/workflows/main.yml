name: Build and Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04" # for Linux build
            args: ""
          - platform: "windows-latest" # for Windows build
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          # TCL is required for libsqlite3-sys 'bundled' feature on Windows
          choco install tcl --no-progress

          # Find OpenSSL location dynamically
          $openssl_root = Get-ChildItem -Path "C:\Program Files" -Filter "OpenSSL*" | Select-Object -First 1
          if ($null -eq $openssl_root) {
            Write-Error "OpenSSL not found in C:\Program Files"
            exit 1
          }

          $openssl_path = $openssl_root.FullName
          Write-Host "Found OpenSSL at: $openssl_path"

          # Find lib directory (could be lib, lib/VC, or lib/VC/x64)
          $lib_dir = Get-ChildItem -Path $openssl_path -Filter "libcrypto.lib" -Recurse | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          if ($null -eq $lib_dir) {
            # Try searching for static lib if dynamic not found
            $lib_dir = Get-ChildItem -Path $openssl_path -Filter "libcrypto_static.lib" -Recurse | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          }

          if ($null -eq $lib_dir) {
            Write-Error "libcrypto.lib not found in $openssl_path"
            exit 1
          }

          $include_dir = Join-Path $openssl_path "include"

          Write-Host "Setting OPENSSL_DIR=$openssl_path"
          Write-Host "Setting OPENSSL_LIB_DIR=$lib_dir"
          Write-Host "Setting OPENSSL_INCLUDE_DIR=$include_dir"

          echo "OPENSSL_DIR=$openssl_path" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$lib_dir" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$include_dir" >> $env:GITHUB_ENV

      - name: Debug OpenSSL Path (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          dir "$env:OPENSSL_DIR"
          dir "$env:OPENSSL_LIB_DIR"
          dir "$env:OPENSSL_INCLUDE_DIR"


      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Check Tauri Build configuration
        run: npm run tauri info

      - name: Run Rust tests
        working-directory: ./src-tauri
        run: cargo test --verbose

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
